name: Deploy site

# Deploys the CDK stack (CloudFront + S3 SPA + API Gateway + Lambda +
# DynamoDB) that serves yopass.thelauerfam.com. Runs after the Test
# workflow succeeds on master, so a broken build can never deploy.
# yamllint disable-line rule:truthy
on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: deploy-site
  cancel-in-progress: false

jobs:
  deploy:
    name: CDK deploy
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      # Keyless authentication to AWS via GitHub's OIDC provider
      id-token: write
      contents: read
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "yarn"
          cache-dependency-path: website/yarn.lock

      - uses: actions/setup-go@v6
        with:
          go-version-file: deploy/cdk/go.mod
          cache-dependency-path: deploy/cdk/go.sum

      - name: Build website
        working-directory: website
        run: |
          yarn install --frozen-lockfile --network-timeout 600000
          yarn build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::451645558365:role/github-actions-role
          aws-region: us-east-1

      - name: Build Lambda bundle and deploy CDK stack
        working-directory: deploy/cdk
        # bin/cdk.ts reads these env vars as a fallback to CDK context.
        # Passing domain config via -c proved unreliable (the context
        # didn't reach the app process), so set it in the environment.
        # HostedZone.fromLookup also needs a concrete account/region on
        # the stack — the CLI doesn't populate CDK_DEFAULT_ACCOUNT under
        # the OIDC session, so set it explicitly (matches the pre-cached
        # hosted-zone entry in cdk.context.json, so no live Route 53 call).
        env:
          YOPASS_DOMAIN_NAME: yopass.thelauerfam.com
          YOPASS_HOSTED_ZONE: thelauerfam.com
          CDK_DEFAULT_ACCOUNT: "451645558365"
          CDK_DEFAULT_REGION: us-east-1
        # Build the Lambda bundle and deploy in one step so node_modules is
        # guaranteed present. Invoke the CDK CLI entrypoint with node
        # directly: both `npx cdk` and `npm exec -- cdk` exited 0 on the
        # runner in ~2s with no output and no deploy (even `--version`
        # printed nothing). A direct node invocation can't be swallowed by
        # npm's exec layers — if the file is missing it errors, if it runs
        # it prints. Require recognizable cdk completion output so a silent
        # no-op can never report success again.
        run: |
          set -euo pipefail
          npm ci
          npm run build
          echo "node: $(node --version)  npm: $(npm --version)"
          ls -la node_modules/.bin/cdk node_modules/aws-cdk/bin/cdk
          node node_modules/aws-cdk/bin/cdk --version
          node node_modules/aws-cdk/bin/cdk deploy CdkStack \
          --require-approval never --verbose 2>&1 | tee /tmp/cdk-deploy.log
          grep -qE 'no differences|✅|Total time|deployment time' /tmp/cdk-deploy.log || \
          { echo "::error::cdk deploy produced no recognizable completion output"; exit 1; }

      - name: Verify deployed site
        run: |
          sleep 30
          STATUS=$(curl -sS -m 30 -o /dev/null -w '%{http_code}' https://yopass.thelauerfam.com/)
          echo "site returned HTTP ${STATUS}"
          test "${STATUS}" = "200"
