name: Test
# yamllint disable-line rule:truthy
on:
  pull_request: {}
  push:
    branches:
      - master
jobs:
  go:
    name: Go Test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
      memcached:
        image: memcached
        ports:
          - 11211:11211
    env:
      MEMCACHED: localhost:11211
      REDIS_URL: "redis://localhost:6379/0"
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        id: go
        with:
          go-version-file: go.mod

      - name: Go Test
        run: |
          for i in {1..5}; do if ! echo stats | nc -w 1 localhost 11211 >/dev/null; then echo 'Waiting for memcached' && sleep 1; fi; done
          go test ./... -race -coverprofile=coverage.txt -covermode=atomic -v

      - name: codecov upload
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
  node:
    name: Website Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "yarn"
          cache-dependency-path: website/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Lint
        run: yarn tsc && yarn run lint

      - name: Unit tests
        run: yarn test:unit

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -e "console.log(require('./node_modules/@playwright/test/package.json').version)")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Run Playwright tests
        run: yarn test --project=chromium
        env:
          CI: true

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: website/playwright-report/
          retention-days: 30

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-results
          path: website/test-results/
          retention-days: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  dependabot-merge:
    name: "Dependabot automerge"
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    needs: ["node", "go"]
    if: github.actor == 'dependabot[bot]' && github.event_name == 'pull_request'
    steps:
      - uses: fastify/github-action-merge-dependabot@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          target: "minor"
